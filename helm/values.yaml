service:
  name: checkout
image:
  repository: 952893849914.dkr.ecr.us-east-1.amazonaws.com/aicares-application/checkout
containerPort: 5050
resources:
  limits:
    memory: "20Mi"
  requests:
    memory: "10Mi"
    cpu: "50m"
env:
  - name: CHECKOUT_PORT
    value: "5050"
  - name: FLAGD_HOST
    value: "flagd"
  - name: FLAGD_PORT
    value: "8013"
  - name: CART_ADDR
    value: "cart:7070"
  - name: CURRENCY_ADDR
    value: "currency:7001"
  - name: EMAIL_ADDR
    value: "http://email:6060"
  - name: PAYMENT_ADDR
    value: "payment:50051"
  - name: PRODUCT_CATALOG_ADDR
    value: "product-catalog:3550"
  - name: SHIPPING_ADDR
    value: "http://shipping:50050"
  - name: OTEL_SERVICE_NAME
    value: "checkout"
  - name: OTEL_EXPORTER_OTLP_ENDPOINT
    value: "http://otel-collector:4317"
nodeSelector:
  eks.amazonaws.com/nodegroup: graviton-workers
